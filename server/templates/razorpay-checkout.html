<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarsbuyNsell — Secure Payment</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0D0D18 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 420px;
      width: 100%;
    }
    .logo {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(90deg, #6C63FF, #A78BFA);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 48px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(108,99,255,0.2);
      border-top: 4px solid #6C63FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-text {
      font-size: 16px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 8px;
    }
    .status-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
    }
    .error-box {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 12px;
      padding: 16px;
      margin-top: 24px;
      display: none;
    }
    .error-text { font-size: 14px; color: #FCA5A5; }
    .retry-btn {
      margin-top: 12px;
      padding: 10px 24px;
      background: #6C63FF;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">CarsbuyNsell</div>
    <div class="subtitle">Secure Payment via Razorpay</div>
    <div id="loading">
      <div class="spinner"></div>
      <p class="status-text">Opening payment gateway…</p>
      <p class="status-sub">Please wait, do not close this window</p>
    </div>
    <div class="error-box" id="errorBox">
      <p class="error-text" id="errorText">Payment could not be initiated.</p>
      <button class="retry-btn" onclick="initPayment()">Try Again</button>
    </div>
  </div>

  <script>
    // Parse query params
    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    const orderId   = getParam('order_id');
    const amount    = getParam('amount');
    const currency  = getParam('currency') || 'INR';
    const keyId     = getParam('key_id');
    const userName  = getParam('name')  || 'CarsbuyNsell User';
    const userEmail = getParam('email') || '';
    const redirectUrl = getParam('redirect_url');

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      const box = document.getElementById('errorBox');
      document.getElementById('errorText').textContent = msg;
      box.style.display = 'block';
    }

    function redirectToApp(params) {
      if (!redirectUrl) {
        showError('Missing redirect URL. Cannot return to app.');
        return;
      }
      const qs = new URLSearchParams(params).toString();
      const delimiter = redirectUrl.includes('?') ? '&' : '?';
      window.location.href = redirectUrl + delimiter + qs;
    }

    function initPayment() {
      if (!orderId || !amount || !keyId) {
        showError('Missing payment parameters. Please go back and try again.');
        return;
      }

      const options = {
        key: keyId,
        amount: amount,
        currency: currency,
        name: 'CarsbuyNsell',
        description: 'Vehicle Access Subscription',
        image: '',
        order_id: orderId,
        prefill: {
          name: userName,
          email: userEmail,
        },
        theme: { color: '#6C63FF' },
        modal: {
          backdropclose: false,
          escape: false,
          handleback: true,
          ondismiss: function() {
            if (!options.handler.called) {
              redirectToApp({
                status: 'failed',
                error_description: 'Payment was cancelled by the user.',
                error_reason: 'cancelled',
              });
            }
          }
        },
        handler: function(response) {
          options.handler.called = true;
          redirectToApp({
            status: 'success',
            razorpay_payment_id: response.razorpay_payment_id,
            razorpay_order_id:   response.razorpay_order_id,
            razorpay_signature:  response.razorpay_signature,
          });
        }
      };

      const rzp = new Razorpay(options);

      rzp.on('payment.failed', function(response) {
        redirectToApp({
          status: 'failed',
          error_code:        response.error.code,
          error_description: response.error.description,
          error_reason:      response.error.reason,
          razorpay_order_id: response.error.metadata?.order_id || orderId,
        });
      });

      // Small delay to let the page render, then pop Razorpay modal
      setTimeout(function() {
        rzp.open();
      }, 600);
    }

    window.addEventListener('load', initPayment);
  </script>
</body>
</html>
